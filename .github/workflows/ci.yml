name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: .nvmrc
    - name: Install pnpm
      uses: pnpm/action-setup@v6
      with:
        version: latest
    - name: Install dependencies
      run: pnpm install
    - name: Run Lint
      run: pnpm lint
    - name: Run tests
      run: pnpm test
